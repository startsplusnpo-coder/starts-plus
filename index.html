function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function genItemNo(category, items){
  const prefix=CAT_PREFIX[category]||"OT";
  const same=items.filter(i=>i.itemNo&&i.itemNo.startsWith(prefix));
  const nums=same.map(i=>parseInt(i.itemNo.split("-")[1]||0)).filter(n=>!isNaN(n));
  const next=(nums.length>0?Math.max(...nums):0)+1;
  return prefix+"-"+String(next).padStart(3,"0");
}

function getKey(){return localStorage.getItem(AK)||""}

function getPhotos(item){if(item.photos&&item.photos.length>0)return item.photos;if(item.photo)return[item.photo];return[];}
function nowDT(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")+"T"+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}
function fmtDT(s){if(!s)return"";try{const d=new Date(s);return d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日 "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}catch{return s;}}
function fmtPrice(v){if(v==null||v==="")return"―";const n=Number(v);if(isNaN(n))return"―";return n===0?"無料":n.toLocaleString()+"円";}
function photoSrc(p){
  if(!p)return"";
  if(p.startsWith("http"))return p; // 旧データ互換
  return `data:image/jpeg;base64,${p}`;
}

function blobDownload(blob,fn){const u=URL.createObjectURL(blob);const a=document.createElement("a");a.href=u;a.download=fn;document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(u),2000);}
function today(){return new Date().toISOString().slice(0,10);}

function resizeImg(file){
  return new Promise(r=>{
    const img=new Image(),u=URL.createObjectURL(file);
    img.onload=()=>{
      const c=document.createElement("canvas");let w=img.width,h=img.height,m=480;
      if(w>h&&w>m){h=h*m/w;w=m}else if(h>m){w=w*m/h;h=m}
      c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);
      URL.revokeObjectURL(u);r(c.toDataURL("image/jpeg",0.60).split(",")[1]);
    };img.src=u;
  });
}
// base64→サムネイル（150px・超軽量）
function makeThumb(b64){
  return new Promise(r=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement("canvas");let w=img.width,h=img.height,m=150;
      if(w>h&&w>m){h=h*m/w;w=m}else if(h>m){w=w*m/h;h=m}
      c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);
      r(c.toDataURL("image/jpeg",0.50).split(",")[1]);
    };
    img.src="data:image/jpeg;base64,"+b64;
  });
}
// URL or base64 → base64に統一
async function toBase64(p){
  if(!p)return null;
  if(!p.startsWith("http"))return p; // すでにbase64
  const res=await fetch(p);
  const blob=await res.blob();
  return new Promise(r=>{
    const reader=new FileReader();
    reader.onload=e=>r(e.target.result.split(",")[1]);
    reader.readAsDataURL(blob);
  });
}

async function uploadToCloudinary(b64){
  const ts=Math.round(Date.now()/1000);
  const str=`timestamp=${ts}${CL_SECRET}`;
  const buf=new TextEncoder().encode(str);
  const hash=await crypto.subtle.digest("SHA-1",buf);
  const sig=Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,"0")).join("");
  const fd=new FormData();
  fd.append("file",`data:image/jpeg;base64,${b64}`);
  fd.append("api_key",CL_KEY);
  fd.append("timestamp",ts);
  fd.append("signature",sig);
  const res=await fetch(`https://api.cloudinary.com/v1_1/${CL_CLOUD}/image/upload`,{method:"POST",body:fd});
  const d=await res.json();
  if(!res.ok)throw new Error(d?.error?.message||"アップロード失敗");
  return d.secure_url;
}

function b64toBlob(b64){const b=atob(b64);const a=new Uint8Array(b.length);for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return new Blob([a],{type:"image/jpeg"});}

async function callAPI(body){
  const key=getKey();if(!key)throw new Error("NO_KEY");
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify(body)
  });
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e?.error?.message||`HTTP ${res.status}`);}
  return res.json();
}

async function analyzePhotos(photos){
  // 渡された全写真をimage blockとして送る（1枚でも複数枚でも対応）
  const imgBlocks=photos.map(b64=>({type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}}));
  const d=await callAPI({
    model:"claude-sonnet-4-20250514",max_tokens:600,
    messages:[{role:"user",content:[
      ...imgBlocks,
      {type:"text",text:"この家電・家具の写真を見て以下のJSONのみ返してください。他のテキストは不要です。\n{\"name\":\"品名(メーカー型番容量など)\",\"category\":\"冷蔵庫か洗濯機か電子レンジかコンロか家具かその他\",\"condition\":\"良好か普通か難あり\",\"estimatedPrice\":0,\"memo\":\"特記事項\"}"}
    ]}]
  });
  const tb=d.content?.find(b=>b.type==="text");
  if(!tb)throw new Error("応答なし");
  // JSONブロックを広めに抽出
  const raw=tb.text;
  const m=raw.match(/\{[\s\S]+\}/);
  if(!m)throw new Error("JSON解析失敗: "+raw.slice(0,60));
  try{
    const r=JSON.parse(m[0]);
    // categoryとconditionを正規化
    const catMap={"冷蔵庫":"冷蔵庫","洗濯機":"洗濯機","電子レンジ":"電子レンジ","コンロ":"コンロ","家具":"家具"};
    const condMap={"良好":"良好","普通":"普通","難あり":"難あり"};
    r.category=Object.keys(catMap).find(k=>r.category?.includes(k))||r.category||"その他";
    r.condition=Object.keys(condMap).find(k=>r.condition?.includes(k))||r.condition||"普通";
    return r;
  }catch(e){throw new Error("JSON解析失敗");}
}
async function fetchMarketPrice(item){
  // 写真なし・テキストのみで軽量検索
  const d=await callAPI({
    model:"claude-sonnet-4-20250514",max_tokens:300,
    tools:[{type:"web_search_20250305",name:"web_search"}],
    messages:[{role:"user",content:`「${item.name}」のジモティー相場を調べてください。JSONのみ：{"marketPrice":数字,"basis":"根拠"}`}]
  });
  const allText=d.content.filter(b=>b.type==="text").map(b=>b.text).join("");
  if(!allText)throw new Error("応答なし");
  const m=allText.match(/\{[\s\S]*?\}/);if(!m)throw new Error("JSON解析失敗");
  return JSON.parse(m[0]);
}

async function searchMarketPrice(item){
  const name=item.name+(item.brand?" "+item.brand:"");
  const d=await callAPI({

調査後JSONのみ返してください：{"jimoty":{"min":0,"max":0,"avg":0},"mercari":{"min":数字,"max":数字,"avg":数字},"yahooauction":{"min":数字,"max":数字,"avg":数字},"recommended":数字,"summary":"相場まとめ（2文以内）"}`}]

  const allText=d.content.filter(b=>b.type==="text").map(b=>b.text).join("");
  if(!allText)throw new Error("テキスト応答なし");
  const m=allText.match(/\{[\s\S]*?"summary"[\s\S]*?\}/);
  if(!m)throw new Error("相場データの取得に失敗しました。少し待って再試行してください。");
  try{return JSON.parse(m[0]);}catch{throw new Error("データの解析に失敗しました");}
}

async function genListing(item){

function exportCSV(items){
  try{
    const h=["品名","カテゴリ","状態","入庫日","仕入価格(円)","予想売価(円)","ステータス","メモ","引渡日時","引渡価格(円)","属性","写真枚数"];
    const rows=items.map(item=>{
      const ph=getPhotos(item);const ho=item.handover||{};
      const am=(ho.attributes||[]).filter(a=>a!=="その他").join("・");
      const af=ho.attributes?.includes("その他")&&ho.otherText?(am?am+"・その他:"+ho.otherText:"その他:"+ho.otherText):am;
      return[item.name,item.category,item.condition,item.date,
        item.purchasePrice!=null&&item.purchasePrice!==""?Number(item.purchasePrice):0,
        item.estimatedPrice!=null&&item.estimatedPrice!==""?Number(item.estimatedPrice):"",
        item.status,item.memo||"",ho.datetime?fmtDT(ho.datetime):"",
        ho.price!=null&&ho.price!==""?Number(ho.price):"",af,ph.length
      ].map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(",");
    });
    const csv="\uFEFF"+[h.map(x=>`"${x}"`).join(","),...rows].join("\r\n");
    blobDownload(new Blob([csv],{type:"text/csv;charset=utf-8"}),"すたーつプラス_"+today()+".csv");
  }catch(e){alert("CSV出力エラー："+e.message);}
}

async function savePhoto(b64,idx){
  const blob=b64toBlob(b64);
  const file=new File([blob],`photo_${idx+1}.jpg`,{type:"image/jpeg"});
  if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
    try{await navigator.share({files:[file],title:`写真${idx+1}`});return;}
    catch(e){if(e.name==="AbortError")return;}
  }
  blobDownload(blob,`photo_${idx+1}.jpg`);
}
async function saveAllPhotos(photos){for(let i=0;i<photos.length;i++){await savePhoto(photos[i],i);if(i<photos.length-1)await new Promise(r=>setTimeout(r,500));}}

function Spinner({color="#fff",size=15}){return <span style={{width:size,height:size,border:`2px solid rgba(255,255,255,0.3)`,borderTopColor:color,borderRadius:"50%",display:"inline-block",animation:"spin .7s linear infinite",flexShrink:0}}/>;}
function CopyBtn({text,label}){
  const[ok,setOk]=useState(false);
  return <button onClick={()=>{navigator.clipboard.writeText(text);setOk(true);setTimeout(()=>setOk(false),2000);}} style={{background:ok?"#e8f5e9":"#f5f5f5",color:ok?"#2e7d32":"#333",border:"1px solid #ddd",borderRadius:8,padding:"8px 14px",fontSize:13,fontWeight:600}}>{ok?"✓ コピー済":label}</button>;
}

  return(
    <div>
      {/* サムネイル */}
      {photos.length>0&&(
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6,marginBottom:10}}>
          {photos.map((p,i)=>(
            <div key={i} style={{position:"relative",aspectRatio:"1",borderRadius:10,overflow:"hidden",background:"#000"}}>
              <img src={photoSrc(p)} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>
              <button onMouseDown={e=>{e.preventDefault();onRemove(i);}} style={{position:"absolute",top:3,right:3,width:20,height:20,borderRadius:"50%",background:"rgba(0,0,0,0.65)",color:"#fff",border:"none",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>×</button>
              {i===0&&<div style={{position:"absolute",bottom:3,left:3,background:"rgba(0,0,0,0.55)",color:"#fff",fontSize:9,borderRadius:4,padding:"1px 4px"}}>メイン</div>}
            </div>
          ))}
          {/* 空スロット */}
          {Array.from({length:MAX_PHOTOS-photos.length}).map((_,i)=>(
            <div key={i} style={{aspectRatio:"1",borderRadius:10,border:"1.5px dashed #ddd",background:"#fafafa"}}/>
          ))}
        </div>
      )}

      {/* 解析中 */}
      {status==="analyzing"&&<div style={{background:"#555",color:"#fff",borderRadius:12,padding:"11px",fontSize:13,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:10}}><Spinner/>AIが解析中…</div>}
      {status==="reanalyzing"&&<div style={{background:G,color:"#fff",borderRadius:12,padding:"11px",fontSize:13,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:10}}><Spinner/>AIが解析中…</div>}

      {/* ボタン群 */}

                  📷 カメラで撮影してAI自動入力

              </label>

                <div style={{background:"#fff",color:G,border:`2px solid ${G}`,borderRadius:14,padding:"13px",fontSize:15,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:10,cursor:"pointer",userSelect:"none"}}>

/* ── APIキー設定 ── */
function ApiKeySetup({onSave}){
  const[key,setKey]=useState("");const[err,setErr]=useState("");const[testing,setTesting]=useState(false);
  const handleSave=async()=>{
    if(!key.trim().startsWith("sk-ant-")){setErr("APIキーは「sk-ant-」から始まります");return;}
    setTesting(true);setErr("");saveKey(key);
    try{await callAPI({model:"claude-haiku-4-5-20251001",max_tokens:10,messages:[{role:"user",content:"hi"}]});onSave();}
    catch(e){setErr("接続失敗："+e.message);localStorage.removeItem(AK);}
    setTesting(false);
  };
  return(
    <div style={{minHeight:"100vh",background:"#f7f7f5",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{background:"#fff",borderRadius:20,padding:28,maxWidth:400,width:"100%",boxShadow:"0 2px 16px rgba(0,0,0,0.09)"}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:36,marginBottom:10}}>🔑</div>
          <div style={{fontSize:18,fontWeight:700,color:"#222",marginBottom:6}}>APIキーを設定</div>
          <div style={{fontSize:13,color:"#888",lineHeight:1.6}}>Anthropic APIキーを入力してください。<br/>端末に保存され、次回から不要です。</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <input type="password" value={key} onChange={e=>setKey(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSave()} placeholder="sk-ant-api03-..." style={{fontSize:14}}/>
          {err&&<div style={{fontSize:13,color:"#c62828",background:"#ffebee",borderRadius:8,padding:"8px 12px"}}>{err}</div>}
          <button onClick={handleSave} disabled={testing||!key.trim()}
            style={{background:key.trim()?G:"#aaa",color:"#fff",border:"none",borderRadius:12,padding:"14px",fontSize:15,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            {testing?<><Spinner/>確認中…</>:"保存して開始"}
          </button>
        </div>
      </div>
    </div>
  );
}

    try{
      const newB64s=[];
      for(const file of files){
        const b64=await resizeImg(file);
        newB64s.push(b64);
      }
      const newPhotos=[...formRef.current.photos,...newB64s].slice(0,MAX_PHOTOS);
      setForm(f=>({...f,photos:newPhotos}));
      formRef.current={...formRef.current,photos:newPhotos};
      if(isFirst&&newB64s.length>0){
        try{
          // 1枚目登録時は常に1枚目のみで解析（高速・安定）
          const r=await analyzePhotos([newB64s[0]]);
          setForm(f=>({...f,name:r.name||f.name,category:CATEGORIES.includes(r.category)?r.category:f.category,condition:CONDITIONS.includes(r.condition)?r.condition:f.condition,estimatedPrice:r.estimatedPrice!=null?String(r.estimatedPrice):f.estimatedPrice,memo:r.memo||f.memo}));
        }catch(ae){if(ae.message==="NO_KEY"){setHasKey(false);setAnalyzeStatus("idle");return;}}
      }
    }catch(e){if(e.message==="NO_KEY"){setHasKey(false);setAnalyzeStatus("idle");return;}alert("写真の追加に失敗："+e.message);}
    setAnalyzeStatus("idle");

    const photos=formRef.current.photos;if(!photos.length)return;

                      <div style={{fontWeight:700,fontSize:15,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",color:"#222"}}>{item.name}</div>
                    </div>
                    <div style={{fontSize:12,color:"#888",marginTop:3}}>{item.category} · {item.condition}{item.estimatedPrice!==""&&item.estimatedPrice!=null&&<span style={{color:"#2e7d32",fontWeight:600}}> · {fmtPrice(item.estimatedPrice)}</span>}</div>
                  </div>
                  <div style={{background:sc.bg,color:sc.text,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700,whiteSpace:"nowrap",flexShrink:0,display:"flex",alignItems:"center",gap:4}}>
                    <span style={{width:6,height:6,borderRadius:"50%",background:sc.dot,display:"inline-block"}}/>{item.status}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {view==="add"&&<FormBody isEdit={false} form={form} setForm={setForm} analyzeStatus={analyzeStatus} analyzeMode={analyzeMode} setAnalyzeMode={setAnalyzeMode} onPhoto={handlePhoto} onRemovePhoto={removePhoto} onReanalyze={handleReanalyze} onBack={()=>setView("list")} onSubmit={addItem}/>}
      {view==="edit"&&<FormBody isEdit={true} form={form} setForm={setForm} analyzeStatus={analyzeStatus} analyzeMode={analyzeMode} setAnalyzeMode={setAnalyzeMode} onPhoto={handlePhoto} onRemovePhoto={removePhoto} onReanalyze={handleReanalyze} onBack={()=>setView("detail")} onSubmit={saveEdit}/>}

      {/* 詳細 */}
      {view==="detail"&&curItem&&(()=>{
        const item=curItem;const photos=getPhotos(item);const ho=item.handover;
        return(
          <div style={{padding:"16px 16px 80px",maxWidth:560,margin:"0 auto"}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
              <button onClick={()=>setView("list")} style={{background:"none",border:"none",fontSize:22,color:"#333"}}>←</button>
              <div style={{fontSize:16,fontWeight:700,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:"#222"}}>{item.name}</div>
              <button onClick={()=>openEdit(item)} style={{background:"#f0f0ee",border:"none",borderRadius:8,padding:"6px 13px",fontSize:13,fontWeight:600,color:"#333"}}>編集</button>
              <button onClick={()=>setDeleteTarget(item.id)} style={{background:"none",border:"none",fontSize:18,opacity:0.3}}>🗑</button>
            </div>
            {item.itemNo&&(
              <div style={{background:"#1a472a",borderRadius:12,padding:"10px 16px",marginBottom:14,display:"flex",alignItems:"center",gap:10}}>
                <div style={{fontSize:22,fontWeight:800,color:"#fff",letterSpacing:"0.1em",fontFamily:"monospace"}}>{item.itemNo}</div>
                <div style={{fontSize:11,color:"rgba(255,255,255,0.6)"}}>管理ナンバー</div>
              </div>
            )}
            {photos.length>0&&(
              <div style={{marginBottom:14}}>
                {photos.length===1
                  ?<div style={{borderRadius:16,overflow:"hidden",maxHeight:240,display:"flex",justifyContent:"center",background:"#000",cursor:"pointer"}} onClick={()=>setLightbox({photos,index:0})}>
                    <img src={photoSrc(photos[0])} style={{maxHeight:240,maxWidth:"100%",objectFit:"contain"}} alt={item.name}/>
                  </div>
                  :<div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:4,borderRadius:16,overflow:"hidden",maxHeight:220}}>
                    <div style={{background:"#000",cursor:"pointer"}} onClick={()=>setLightbox({photos,index:0})}>
                      <img src={photoSrc(photos[0])} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>
                    </div>
                    <div style={{display:"grid",gridTemplateRows:`repeat(${Math.min(photos.length-1,4)},1fr)`,gap:4}}>
                      {photos.slice(1,5).map((p,i)=>(
                        <div key={i} style={{background:"#000",cursor:"pointer"}} onClick={()=>setLightbox({photos,index:i+1})}>
                          <img src={photoSrc(p)} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>
                        </div>
                      ))}
                    </div>
                  </div>
                }
                <div style={{fontSize:11,color:"#aaa",textAlign:"right",marginTop:4}}>{photos.length}枚 · タップで拡大</div>
              </div>
            )}
            <div style={{background:"#fff",borderRadius:16,padding:16,marginBottom:12,boxShadow:"0 1px 4px rgba(0,0,0,0.07)"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
                {[["カテゴリ",item.category],["状態",item.condition],["入庫日",item.date],["仕入価格",fmtPrice(item.purchasePrice??0)],["予想売価",fmtPrice(item.estimatedPrice)]].map(([k,v])=>(
                  <div key={k}><div style={{fontSize:11,color:"#aaa",marginBottom:3}}>{k}</div><div style={{fontSize:14,fontWeight:600,color:(k==="予想売価"||k==="仕入価格")?"#2e7d32":"#222"}}>{v}</div></div>
                ))}
                {item.memo&&<div style={{gridColumn:"1/-1"}}><div style={{fontSize:11,color:"#aaa",marginBottom:3}}>メモ</div><div style={{fontSize:14,color:"#444"}}>{item.memo}</div></div>}
              </div>
            </div>
            {item.status==="引渡済"&&ho&&(
              <div style={{background:"#f5f5f5",borderRadius:16,padding:16,marginBottom:12,border:"1px solid #e0e0e0"}}>
                <div style={{fontSize:12,color:"#888",fontWeight:700,marginBottom:10}}>🤝 引渡情報</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                  <div><div style={{fontSize:11,color:"#aaa",marginBottom:3}}>引渡日時</div><div style={{fontSize:13,fontWeight:600,color:"#333"}}>{fmtDT(ho.datetime)||"―"}</div></div>
                  <div><div style={{fontSize:11,color:"#aaa",marginBottom:3}}>引渡価格</div><div style={{fontSize:13,fontWeight:600,color:"#2e7d32"}}>{fmtPrice(ho.price)}</div></div>
                  {ho.attributes&&ho.attributes.length>0&&(
                    <div style={{gridColumn:"1/-1"}}>
                      <div style={{fontSize:11,color:"#aaa",marginBottom:6}}>属性</div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                        {ho.attributes.filter(a=>a!=="その他").map(a=><span key={a} style={{background:"#e8f5e9",color:G,borderRadius:16,padding:"3px 10px",fontSize:12,fontWeight:600}}>{a}</span>)}
                        {ho.attributes.includes("その他")&&<span style={{background:"#e3f2fd",color:"#1565c0",borderRadius:16,padding:"3px 10px",fontSize:12,fontWeight:600}}>その他{ho.otherText?`：${ho.otherText}`:""}</span>}
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}
            <div style={{background:"#fff",borderRadius:16,padding:16,marginBottom:12,boxShadow:"0 1px 4px rgba(0,0,0,0.07)"}}>
              <div style={{fontSize:12,color:"#aaa",marginBottom:10}}>ステータス変更</div>
              <div style={{display:"flex",gap:8}}>
                {STATUSES.map(s=>{const c=SC[s];return(
                  <button key={s} onClick={()=>updateStatus(item.id,s)}
                    style={{flex:1,padding:"10px 0",border:item.status===s?`2px solid ${c.dot}`:"1.5px solid #ddd",borderRadius:10,background:item.status===s?c.bg:"#fff",color:item.status===s?c.text:"#555",fontWeight:700,fontSize:12}}>
                    {s}
                  </button>
                );})}
              </div>
            </div>
            {item.status!=="引渡済"&&(
              <button onClick={()=>{setMarketItem(item);setMarketData(null);}}
                style={{width:"100%",background:"#1565c0",color:"#fff",border:"none",borderRadius:14,padding:"14px",fontSize:15,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:10}}>
                📊 相場を調べる（ジモティー・メルカリ・ヤフオク）
              </button>
            )}
            {item.status!=="引渡済"&&(
              <button onClick={()=>openListing(item)} style={{width:"100%",background:"#e65100",color:"#fff",border:"none",borderRadius:14,padding:"16px",fontSize:16,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
                📋 ジモティー出品準備
              </button>
            )}
          </div>
        );
      })()}

      {/* 出品準備 */}
      {view==="listing"&&curItem&&(()=>{
        const item=curItem;const photos=getPhotos(item);
        return(
          <div style={{padding:"16px 16px 80px",maxWidth:560,margin:"0 auto"}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:22}}>
              <button onClick={()=>setView("detail")} style={{background:"none",border:"none",fontSize:22,color:"#333"}}>←</button>
              <div style={{fontSize:17,fontWeight:700,color:"#222"}}>ジモティー出品準備</div>
            </div>
            {genning&&<div style={{textAlign:"center",padding:"50px 0",color:"#888"}}><div style={{width:28,height:28,border:"2px solid #ddd",borderTopColor:G,borderRadius:"50%",animation:"spin .7s linear infinite",margin:"0 auto 14px"}}/>文章を生成中…</div>}
            {listing&&<>
              <div style={{background:"#fff",borderRadius:16,padding:16,marginBottom:12,boxShadow:"0 1px 4px rgba(0,0,0,0.07)"}}>
                <div style={{fontSize:11,fontWeight:700,color:"#aaa",marginBottom:10}}>STEP 1 — タイトルをコピー</div>
                <div style={{background:"#f7f7f5",borderRadius:10,padding:"11px 14px",fontSize:15,fontWeight:600,color:"#222",marginBottom:10,lineHeight:1.5}}>{listing.title}</div>
                <CopyBtn text={listing.title} label="タイトルをコピー"/>
              </div>
              <div style={{background:"#fff",borderRadius:16,padding:16,marginBottom:12,boxShadow:"0 1px 4px rgba(0,0,0,0.07)"}}>
                <div style={{fontSize:11,fontWeight:700,color:"#aaa",marginBottom:10}}>STEP 2 — 本文をコピー（修正も可）</div>
                <textarea value={listing.body} onChange={e=>setListing(l=>({...l,body:e.target.value}))} rows={6} style={{fontSize:14,marginBottom:10,resize:"vertical"}}/>
                <CopyBtn text={listing.body} label="本文をコピー"/>
              </div>
              {photos.length>0&&(
                <div style={{background:"#fff",borderRadius:16,padding:16,marginBottom:12,boxShadow:"0 1px 4px rgba(0,0,0,0.07)"}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#aaa",marginBottom:6}}>STEP 3 — 写真を保存（{photos.length}枚）</div>
                  <div style={{fontSize:12,color:"#888",marginBottom:10,background:"#fffde7",borderRadius:8,padding:"8px 10px",lineHeight:1.6}}>📱 iPhoneの場合：写真をタップ→「写真に追加」を選ぶ</div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6,marginBottom:12}}>
                    {photos.map((p,i)=>(
                      <div key={i} style={{aspectRatio:"1",borderRadius:8,overflow:"hidden",cursor:"pointer",position:"relative"}} onClick={()=>savePhoto(p,i)}>
                        <img src={photoSrc(p)} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>
                        <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.2)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:18}}>↓</div>
                      </div>
                    ))}
                  </div>
                  <button onClick={()=>saveAllPhotos(photos)} style={{width:"100%",background:"#f5f5f5",color:"#333",border:"1px solid #ddd",borderRadius:10,padding:"11px",fontSize:14,fontWeight:600}}>📥 全写真を保存（{photos.length}枚）</button>
                </div>
              )}
              <div style={{background:"#fff",borderRadius:16,padding:16,boxShadow:"0 1px 4px rgba(0,0,0,0.07)"}}>
                <div style={{fontSize:11,fontWeight:700,color:"#aaa",marginBottom:10}}>STEP {photos.length>0?"4":"3"} — ジモティーで出品</div>
                <button onClick={()=>{updateStatus(item.id,"出品中");window.open("https://jmty.jp/items/new","_blank");}}
                  style={{width:"100%",background:"#e65100",color:"#fff",border:"none",borderRadius:12,padding:"15px",fontSize:15,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:10}}>
                  🔗 ジモティーを開く（出品中に変更）
                </button>
                <div style={{fontSize:12,color:"#888",lineHeight:1.7}}>ジモティーが開いたら、コピーしたタイトル・本文を貼り付けて写真を添付してください。</div>
            </div>
            {/* 相場価格決定パネル */}
            <div style={{background:"#fff",borderRadius:16,padding:16,marginBottom:12,boxShadow:"0 1px 4px rgba(0,0,0,0.07)"}}>
              <div style={{fontSize:11,fontWeight:700,color:"#aaa",marginBottom:10,letterSpacing:"0.08em"}}>💰 ジモティー相場から価格を決める</div>
              {!mktResult&&!mktLoading&&(
                <button onClick={async()=>{
                  setMktLoading(true);setMktErr("");
                  try{const r=await fetchMarketPrice(item);setMktResult(r);}
                  catch(e){setMktErr(e.message);}
                  setMktLoading(false);
                }}
                  style={{width:"100%",background:"#f5f5f5",color:"#333",border:"1px solid #ddd",borderRadius:10,padding:"12px",fontSize:14,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                  🔍 最新相場を調べて価格を提案する
                </button>
              )}
              {mktLoading&&<div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"12px",color:"#888",fontSize:13}}><div style={{width:16,height:16,border:"2px solid #ddd",borderTopColor:"#1a472a",borderRadius:"50%",animation:"spin .7s linear infinite"}}/> ネットで相場を検索中…</div>}
              {mktErr&&<div style={{fontSize:13,color:"#c62828",background:"#ffebee",borderRadius:8,padding:"8px 12px"}}>{mktErr}</div>}
              {mktResult&&(
                <div>
                  <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:6}}>
                    <div style={{fontSize:24,fontWeight:800,color:"#1a472a"}}>¥{Math.round(mktResult.marketPrice*0.7).toLocaleString()}</div>
                    <div style={{fontSize:12,color:"#aaa"}}>（相場 ¥{Number(mktResult.marketPrice).toLocaleString()} × 0.7）</div>
                  </div>
                  <div style={{fontSize:11,color:"#888",marginBottom:10,lineHeight:1.6}}>📊 {mktResult.basis}</div>
                  <div style={{display:"flex",gap:8}}>
                    <CopyBtn text={String(Math.round(mktResult.marketPrice*0.7))} label="価格をコピー"/>
                    <button onClick={()=>setMktResult(null)} style={{background:"#f5f5f5",color:"#888",border:"1px solid #ddd",borderRadius:8,padding:"8px 14px",fontSize:13}}>再検索</button>
                  </div>
                </div>
              )}
            </div>
            </>}
          </div>
        );
      })()}

      {view==="list"&&(
        <button onClick={()=>{const f=EF;setForm(f);formRef.current=f;setAnalyzeStatus("idle");setAnalyzeMode("first");analyzeModeRef.current="first";setView("add");}}
          style={{position:"fixed",bottom:28,right:20,width:60,height:60,borderRadius:"50%",background:G,color:"#fff",border:"none",fontSize:30,boxShadow:"0 4px 16px rgba(0,0,0,0.22)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:20}}>
          +
        </button>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
